<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Book Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(#020111,#081b45,#020111);
color:white;
overflow-x:hidden;
}

/* ⭐ BACKGROUND BINTANG */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 120s linear infinite;
opacity:0.6;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* 🌠 METEOR */

.meteor{
position:fixed;
top:-50px;
left:-50px;
width:3px;
height:120px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteorFall 6s linear infinite;
}

@keyframes meteorFall{
0%{transform:translate(-200px,-200px) rotate(45deg);}
100%{transform:translate(1200px,900px) rotate(45deg);}
}

/* 🪐 PLANET */

.planet{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#4facfe,#00f2fe);
top:80px;
right:80px;
box-shadow:0 0 40px #00eaff;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-25px)}
}

/* 🚀 ROKET */

.rocket{
position:fixed;
bottom:50px;
left:-100px;
font-size:40px;
animation:rocketFly 15s linear infinite;
}

@keyframes rocketFly{
0%{left:-100px}
100%{left:120%}
}

/* NAVBAR */

nav{
display:flex;
justify-content:center;
margin:30px;
z-index:2;
position:relative;
}

.nav-container{
background:rgba(255,255,255,0.1);
padding:15px 40px;
border-radius:50px;
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:600;
}

nav a:hover{
color:#00eaff;
}

/* JUDUL */

h1{
text-align:center;
margin:40px;
font-size:36px;
text-shadow:0 0 20px #00eaff;
}

/* GRID PRODUK */

.daftar-produk{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

/* CARD */

.produk{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,200,255,0.3);
transition:0.4s;
}

.produk:hover{
transform:translateY(-10px);
box-shadow:0 0 35px rgba(0,200,255,0.9);
}

.produk img{
width:100%;
height:230px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.produk h2{
color:#00eaff;
}

.harga{
font-weight:bold;
margin:10px 0;
color:#7de8ff;
}

.deskripsi{
font-size:14px;
line-height:1.5;
}

/* TOMBOL */

.btn{
display:inline-block;
margin-top:10px;
padding:8px 15px;
border-radius:25px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
text-decoration:none;
cursor:pointer;
}

/* KERANJANG */

.cart{
position:fixed;
top:20px;
right:20px;
background:#00c6ff;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#081b45;
padding:30px;
border-radius:15px;
max-width:400px;
text-align:center;
}

.close{
cursor:pointer;
color:red;
margin-top:10px;
display:inline-block;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="meteor"></div>
<div class="planet"></div>
<div class="rocket">🚀</div>

<div class="cart">🛒 <span id="cartCount">0</span></div>

<nav>
<div class="nav-container">
<a href="#">Beranda</a>
<a href="#">Produk</a>
<a href="#">Kontak</a>
</div>
</nav>

<h1>🪐 Planet Book Store</h1>

<section class="daftar-produk">

<div class="produk">
<img src="Hello.jfif">
<h2>Hello</h2>
<p class="harga">Rp189.900</p>
<p class="deskripsi">Novel tentang berdamai dengan masa lalu.</p>
<a class="btn" onclick="showDetail('Hello adalah novel tentang perjalanan emosi dan menerima masa lalu.')">Detail</a>
<a class="btn" onclick="addCart()">Tambah</a>
</div>

<div class="produk">
<img src="Bulan.jpg">
<h2>Bulan</h2>
<p class="harga">Rp199.900</p>
<p class="deskripsi">Petualangan Raib dan teman-temannya.</p>
<a class="btn" onclick="showDetail('Buku fantasi karya Tere Liye tentang petualangan klan Bulan.')">Detail</a>
<a class="btn" onclick="addCart()">Tambah</a>
</div>

</section>

<div class="popup" id="popup">
<div class="popup-content">
<p id="popupText"></p>
<span class="close" onclick="closePopup()">Tutup</span>
</div>
</div>

<script>

let cart = 0;

function addCart(){
cart++;
document.getElementById("cartCount").innerText = cart;
}

function showDetail(text){
document.getElementById("popupText").innerText = text;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
